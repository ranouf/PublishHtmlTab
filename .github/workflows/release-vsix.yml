name: Release VSIX

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Install task dependencies
        run: npm ci --legacy-peer-deps
        working-directory: PublishHtmlReport

      - name: Build release VSIX
        run: npm run build:release

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vsix=ranouf.publish-html-tab-${VERSION}.vsix" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: PublishHtmlTab ${{ steps.meta.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: ${{ steps.meta.outputs.vsix }}
